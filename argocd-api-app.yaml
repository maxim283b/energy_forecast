apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: energy-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/maxim283b/energy_forecast.git' 
    targetRevision: HEAD
    path: helm/energy-api # Путь к папке с Helm-чартом
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated: # Включаем авто-синхронизацию
      prune: true
      selfHeal: true