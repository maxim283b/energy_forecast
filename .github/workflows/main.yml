name: CI/CD Pipeline

on:
  push:
    branches: [ main, "features/**", "infra/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run Lint (flake8)
        run: |
          # Остановит сборку, если есть ошибки синтаксиса или неопределенные переменные
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Предупреждения (стандарт PEP8)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Важно для DVC, чтобы видеть историю

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install DVC
        run: |
          pip install dvc[s3] # Замени [s3] на [gdrive] или [gs], если используешь их

      - name: Pull data from DVC
        env:
          # Добавь секреты в GitHub Settings -> Secrets, если используешь облако
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc pull

      - name: Build Docker image
        run: |
          docker build -t energy-api-service:latest -f docker/Dockerfile .