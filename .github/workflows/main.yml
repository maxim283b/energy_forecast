name: CI/CD Pipeline

on:
  push:
    branches: [ main, "features/**", "infra/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run Lint (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install DVC
        run: |
          pip install "dvc[gdrive]"

      - name: Pull data from DVC
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          # 1. Создаем папку (путь взят точно из твоего лога ошибки)
          mkdir -p ~/.cache/pydrive2fs/710796635688-iivsgbgsb6uv1fap6635dhvuei09o66c.apps.googleusercontent.com/
          
          # 2. Пишем JSON с обязательным полем user_agent
          cat <<EOF > ~/.cache/pydrive2fs/710796635688-iivsgbgsb6uv1fap6635dhvuei09o66c.apps.googleusercontent.com/default.json
          {
            "client_id": "$GDRIVE_CLIENT_ID",
            "client_secret": "$GDRIVE_CLIENT_SECRET",
            "refresh_token": "$GDRIVE_REFRESH_TOKEN",
            "user_agent": "dvc-pydrive2",
            "token_uri": "https://oauth2.googleapis.com/token",
            "token_response": {
              "access_token": "dummy",
              "refresh_token": "$GDRIVE_REFRESH_TOKEN"
            }
          }
          EOF

          # 3. Указываем DVC использовать этот кэш
          dvc pull

      - name: Build Docker image
        run: |
          # Используем путь к Dockerfile в корне
          docker build -t energy-api-service:latest -f Dockerfile .