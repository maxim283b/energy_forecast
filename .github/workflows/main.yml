name: CI/CD Pipeline

on:
  push:
    branches: [ main, "features/**", "infra/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run Lint (flake8)
        run: |
          # Остановит сборку, если есть ошибки синтаксиса
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Предупреждения (стандарт PEP8)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install DVC
        run: |
          pip install "dvc[gdrive]"

      - name: Pull data from DVC
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          # 1. Создаем директорию для кэша pydrive2 (путь взят из логов GitHub Actions)
          mkdir -p ~/.cache/pydrive2fs/710796635688-iivsgbgsb6uv1fap6635dhvuei09o66c.apps.googleusercontent.com/
          
          # 2. Генерируем json-файл. Добавлено поле user_agent, чтобы избежать KeyError
          echo "{
            \"access_token\": \"dummy\",
            \"client_id\": \"$GDRIVE_CLIENT_ID\",
            \"client_secret\": \"$GDRIVE_CLIENT_SECRET\",
            \"refresh_token\": \"$GDRIVE_REFRESH_TOKEN\",
            \"token_expiry\": \"2020-01-01T00:00:00Z\",
            \"token_uri\": \"https://oauth2.googleapis.com/token\",
            \"user_agent\": \"dvc-pydrive2\",
            \"revoke_uri\": \"https://oauth2.googleapis.com/revoke\",
            \"id_token\": null,
            \"id_token_jwt\": null,
            \"token_response\": {
              \"access_token\": \"dummy\",
              \"expires_in\": 3599,
              \"refresh_token\": \"$GDRIVE_REFRESH_TOKEN\",
              \"scope\": \"https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/drive.appdata\",
              \"token_type\": \"Bearer\"
            },
            \"scopes\": [
              \"https://www.googleapis.com/auth/drive\",
              \"https://www.googleapis.com/auth/drive.appdata\"
            ],
            \"token_info_uri\": \"https://oauth2.googleapis.com/tokeninfo\",
            \"invalid\": false,
            \"_class\": \"OAuth2Credentials\",
            \"_module\": \"oauth2client.client\"
          }" > ~/.cache/pydrive2fs/710796635688-iivsgbgsb6uv1fap6635dhvuei09o66c.apps.googleusercontent.com/default.json

          # 3. Пулл данных
          dvc pull

      - name: Build Docker image
        run: |
          # Собираем образ, используя Dockerfile в корне проекта
          docker build -t energy-api-service:latest -f Dockerfile .